# ===== docker-compose.yml cho DefendAI =====
# Môi trường dev local - chạy 3 service: db, api, web
# Sử dụng: docker compose up --build
# (Docker Compose V2 không cần `version:` nữa)

services:
  # ========================================================================
  # Backend API (FastAPI + AI Gateway)
  # ========================================================================
  api:
    build: ./apps/api
    container_name: defense-api
    restart: unless-stopped
    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      # Database (trỏ về service "db" trong compose network)
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/defense_db
      # Routing
      DEFAULT_PROVIDER: google
      ORCHESTRATOR_PROVIDER: nvidia

      # Auth (cho tuần 2-3)
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    depends_on:
      db:
        condition: service_healthy
    networks:
      - defense-net
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health', timeout=3).raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ========================================================================
  # Frontend (Next.js)
  # ========================================================================
  web:
    build: ./apps/web
    container_name: defense-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    networks:
      - defense-net
    command: npm run dev

  # ========================================================================
  # Database (PostgreSQL 16)
  # ========================================================================
  db:
    image: postgres:16-alpine
    container_name: defense-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: defense_db
    ports:
      - "5433:5432"  # Host 5433 → Container 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - defense-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d defense_db"]
      interval: 10s
      timeout: 3s
      retries: 5

# ========================================================================
  # Object Storage (MinIO) — file uploads thay cho disk local
  # ========================================================================
  minio:
    image: minio/minio
    container_name: defense-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_DOMAIN: localhost
    volumes:
      - ./data/minio:/data
    networks:
      - defense-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

# ========================================================================
# Volumes (persistent data)
# ========================================================================
volumes:
  postgres_data:
    name: defense_postgres_data
  minio_data:
    name: defense_minio_data

# ========================================================================
# Networks
# ========================================================================
networks:
  defense-net:
    name: defense-net
    driver: bridge