# ============================================================
# DefendAI CI Pipeline
# Chạy khi: push to main hoặc tạo Pull Request
# Mục đích: Đảm bảo code mới không break build/test
# ============================================================

name: CI - Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel các workflow cũ hơn cùng branch (tiết kiệm资源)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # JOB 1: Backend - Lint + Test
  # ============================================================
  backend:
    name: "Backend (FastAPI)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    services:
      # PostgreSQL test database
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: defense_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          pip install -r requirements.txt

      - name: Lint with Ruff
        run: |
          ruff check app/ --output-format=github
          ruff format --check app/

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/defense_db_test
          GOOGLE_API_KEY: test-placeholder
          NVIDIA_API_KEY: test-placeholder
          DEFAULT_PROVIDER: google
          ORCHESTRATOR_PROVIDER: nvidia
          SECRET_KEY: ci-test-secret-key
        run: |
          python tests/test_ai_endpoints.py

      - name: Build Docker image (verify Dockerfile)
        run: |
          docker build -t defendai-api-test -f Dockerfile .

  # ============================================================
  # JOB 2: Frontend - Lint + Build
  # ============================================================
  frontend:
    name: "Frontend (Next.js)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

  # ============================================================
  # JOB 3: Deployment gates (chỉ chạy khi push to main, cần both jobs pass)
  # ============================================================
  deploy-check:
    name: "Deploy Gate"
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: All checks passed
        run: |
          echo "=========================================="
          echo " CI Passed - Safe to deploy"
          echo "=========================================="
          echo "Backend:  ${{ needs.backend.result }}"
          echo "Frontend: ${{ needs.frontend.result }}"

      - name: Auto-deploy to Render
        run: |
          echo "Trigger Render deploy via GitHub push..."
          echo "Render will auto-deploy on push to main if connected."
          echo "Manual deploy: Render Dashboard → Manual Deploy"

      - name: Auto-deploy to Vercel
        run: |
          echo "Vercel auto-deploys on push to main if connected."
          echo "Manual deploy: Vercel Dashboard → Redeploy"
